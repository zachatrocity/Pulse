services:
  pulse:
    build: .
    image: pulse:local
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PULSE_HOST: 0.0.0.0
      PULSE_PORT: 8787
      PULSE_WEB_ORIGIN: http://localhost:8787
    ports:
      - '8787:8787'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:8787/healthz']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
